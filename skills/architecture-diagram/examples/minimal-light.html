<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Light Architecture</title>
    <style>
      body { margin: 0; padding: 24px; background: #f8fafc; color: #0f172a; font-family: Inter, system-ui, -apple-system, sans-serif; }
      .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; max-width: 1080px; margin: 0 auto; }
      h1 { margin: 0 0 10px; font-size: 20px; }
      p { margin: 0 0 14px; color: #475569; font-size: 13px; }
      svg { width: 100%; display: block; }
      .n { fill: #ffffff; stroke-width: 1.5; rx: 8; }
      .t { fill: #0f172a; font-size: 12px; text-anchor: middle; font-weight: 600; }
      .s { fill: #64748b; font-size: 10px; text-anchor: middle; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Minimal Light - Web + Queue</h1>
      <p>Clean white style for docs and slide decks.</p>
      <svg viewBox="0 0 980 330" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
        </defs>
        <line x1="190" y1="150" x2="350" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
        <line x1="510" y1="150" x2="680" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
        <line x1="430" y1="200" x2="430" y2="245" stroke="#fb923c" stroke-width="2" marker-end="url(#a)"/>
        <rect class="n" x="50" y="110" width="140" height="80" stroke="#0891b2"/><text class="t" x="120" y="142">Frontend</text><text class="s" x="120" y="160">React</text>
        <rect class="n" x="350" y="110" width="160" height="80" stroke="#059669"/><text class="t" x="430" y="142">API Service</text><text class="s" x="430" y="160">Go</text>
        <rect class="n" x="680" y="110" width="160" height="80" stroke="#7c3aed"/><text class="t" x="760" y="142">PostgreSQL</text><text class="s" x="760" y="160">OLTP</text>
        <rect class="n" x="350" y="245" width="160" height="60" stroke="#ea580c"/><text class="t" x="430" y="277">Kafka</text>
      </svg>
    </div>
  </body>
</html>
